<svg xmlns="http://www.w3.org/2000/svg" width="920" height="600" viewBox="0 0 920 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b81"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
    <filter id="cardShadow" x="-1%" y="-1%" width="102%" height="104%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect width="920" height="600" rx="12" fill="url(#bg)" filter="url(#shadow)"/>
  <rect width="920" height="32" rx="12" fill="#0d0d1a"/>
  <rect y="12" width="920" height="20" fill="#0d0d1a"/>
  <circle cx="20" cy="16" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="460" y="20" font-family="Segoe UI, sans-serif" font-size="13" fill="#888" text-anchor="middle">YouTube Downloader</text>

  <!-- Title -->
  <text x="40" y="72" font-family="Segoe UI, sans-serif" font-size="28" font-weight="bold" fill="#e94560">YouTube Downloader</text>
  <text x="40" y="95" font-family="Segoe UI, sans-serif" font-size="13" fill="#a0a0b0">Paste a URL and download instantly</text>

  <!-- URL Input -->
  <rect x="40" y="115" width="840" height="48" rx="8" fill="#1e1e3a" stroke="#3d3d5c" stroke-width="1.5"/>
  <text x="55" y="144" font-family="Segoe UI, sans-serif" font-size="14" fill="#6c6c80">Enter YouTube URL...</text>
  <rect x="830" y="125" width="35" height="28" rx="6" fill="#e94560" opacity="0.9"/>
  <text x="847" y="144" font-family="Segoe UI, sans-serif" font-size="11" fill="white" text-anchor="middle">Go</text>

  <!-- Options Row -->
  <!-- Type -->
  <text x="40" y="190" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#a0a0b0">Type:</text>
  <rect x="85" y="175" width="110" height="32" rx="6" fill="#1e1e3a" stroke="#3d3d5c" stroke-width="1"/>
  <text x="100" y="196" font-family="Segoe UI, sans-serif" font-size="13" fill="white">Video</text>
  <text x="180" y="196" font-family="Segoe UI, sans-serif" font-size="10" fill="#888">▼</text>

  <!-- Quality -->
  <text x="220" y="190" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#a0a0b0">Quality:</text>
  <rect x="285" y="175" width="120" height="32" rx="6" fill="#1e1e3a" stroke="#3d3d5c" stroke-width="1"/>
  <text x="300" y="196" font-family="Segoe UI, sans-serif" font-size="13" fill="white">Highest</text>
  <text x="385" y="196" font-family="Segoe UI, sans-serif" font-size="10" fill="#888">▼</text>

  <!-- Save to -->
  <text x="430" y="190" font-family="Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#a0a0b0">Save to:</text>
  <rect x="495" y="175" width="260" height="32" rx="6" fill="#1e1e3a" stroke="#3d3d5c" stroke-width="1"/>
  <text x="510" y="196" font-family="Segoe UI, sans-serif" font-size="12" fill="#a0a0b0">Downloads/YouTubeDownloader</text>
  <rect x="765" y="175" width="55" height="32" rx="6" fill="#0f3460" stroke="#3d3d5c" stroke-width="1"/>
  <text x="792" y="196" font-family="Segoe UI, sans-serif" font-size="12" fill="white" text-anchor="middle">...</text>

  <!-- Download Button -->
  <rect x="40" y="225" width="840" height="50" rx="10" fill="#e94560" filter="url(#cardShadow)"/>
  <text x="460" y="256" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Download</text>

  <!-- Auth Section -->
  <rect x="40" y="295" width="840" height="85" rx="8" fill="#16213e" stroke="#2d2d44" stroke-width="1"/>
  <text x="55" y="318" font-family="Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="white">Authentication (if downloads fail)</text>

  <!-- Browser dropdown -->
  <text x="55" y="345" font-family="Segoe UI, sans-serif" font-size="12" fill="#a0a0b0">Browser:</text>
  <rect x="115" y="332" width="110" height="28" rx="5" fill="#1e1e3a" stroke="#3d3d5c" stroke-width="1"/>
  <text x="130" y="350" font-family="Segoe UI, sans-serif" font-size="12" fill="white">None</text>
  <text x="210" y="350" font-family="Segoe UI, sans-serif" font-size="9" fill="#888">▼</text>

  <!-- Browse cookies button -->
  <rect x="240" y="332" width="150" height="28" rx="5" fill="#0f3460" stroke="#3d3d5c" stroke-width="1"/>
  <text x="315" y="350" font-family="Segoe UI, sans-serif" font-size="12" fill="white" text-anchor="middle">Browse cookies.txt</text>

  <!-- Hint text -->
  <text x="55" y="372" font-family="Segoe UI, sans-serif" font-size="11" fill="#fdcb6e">If downloads fail: close browser, select it above, or export cookies.txt</text>

  <!-- Active Downloads Header -->
  <text x="40" y="410" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="white">Active Downloads</text>

  <!-- Download Card 1 - Downloading -->
  <rect x="40" y="425" width="840" height="80" rx="10" fill="#16213e" stroke="#2d2d44" stroke-width="1"/>
  <text x="60" y="450" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="white">1. Rick Astley - Never Gonna Give You Up (Official Video)</text>
  <text x="750" y="450" font-family="Segoe UI, sans-serif" font-size="12" fill="#a0a0b0">Downloading (72%)</text>
  <text x="60" y="470" font-family="Segoe UI, sans-serif" font-size="11" fill="#6c6c80">Video - 720p</text>

  <!-- Progress bar background -->
  <rect x="60" y="480" width="780" height="14" rx="7" fill="#2d2d44"/>
  <!-- Progress bar fill -->
  <rect x="60" y="480" width="561" height="14" rx="7" fill="url(#progress)"/>
  <!-- Percentage -->
  <text x="850" y="492" font-family="Consolas, monospace" font-size="11" fill="#a0a0b0" text-anchor="end">72%</text>

  <!-- Download Card 2 - Completed -->
  <rect x="40" y="515" width="840" height="65" rx="10" fill="#16213e" stroke="#00b894" stroke-width="1" opacity="0.8"/>
  <text x="60" y="542" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#00b894">2. Lo-fi Hip Hop Radio - Beats to Relax/Study to</text>
  <text x="750" y="542" font-family="Segoe UI, sans-serif" font-size="12" fill="#00b894">Completed</text>
  <text x="60" y="560" font-family="Segoe UI, sans-serif" font-size="11" fill="#6c6c80">Audio - Highest</text>

  <!-- Progress bar 2 - Full -->
  <rect x="60" y="565" width="780" height="10" rx="5" fill="#2d2d44"/>
  <rect x="60" y="565" width="780" height="10" rx="5" fill="#00b894" opacity="0.7"/>
</svg>
